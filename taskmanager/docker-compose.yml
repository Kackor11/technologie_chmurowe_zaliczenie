services:
  # ==========================================
  # 1. Nginx Reverse Proxy (Bramka wejściowa)
  # ==========================================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web_net
    depends_on:
      backend:
        condition: service_healthy

  # ==========================================
  # 2. Nasza Aplikacja w Javie (Backend)
  # ==========================================
  backend:
    build: .
    image: taskmanager-backend:v1.0
    environment:
      - DB_HOST=db
      - REDIS_HOST=cache
    secrets:
      - db_password
    networks:
      - web_net
      - internal_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  # ==========================================
  # 3. Baza Danych (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=taskdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 4. Cache (Redis)
  # ==========================================
  cache:
    image: redis:alpine
    networks:
      - internal_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ==========================================
# Konfiguracja Sieci, Wolumenów i Sekretów
# ==========================================
networks:
  web_net:
  internal_net:

volumes:
  db_data:

secrets:
  db_password:
    file: ./dbpassword.txt
