# ===============================
# 1. Aplikacja i Graceful Shutdown
# ===============================
spring.application.name=taskmanager
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ===============================
# 2. Baza Danych i Docker Secrets
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:taskdb}
spring.datasource.username=${DB_USER:postgres}

spring.config.import=optional:configtree:/run/secrets/
spring.datasource.password=${db_password:admin}

# ===============================
# 3. Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===============================
# 4. Redis (Cache)
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

# ===============================
# 5. Bezpieczeństwo (OAuth2 & Zitadel)
# ===============================
# Adres z tokena JWT (Wystawca widziany przez przeglądarkę)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081

# Adres wewnątrz Dockera - Spring uderza do Nginxa, a Nginx oszukuje Zitadela nagłówkiem
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://nginx/oauth/v2/keys